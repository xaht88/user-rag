<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Application - Cards</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <nav class="navbar">
            <div class="nav-brand">
                <span class="nav-icon">🤖</span>
                <span>RAG App</span>
            </div>
            <div class="nav-links">
                <a href="#" class="nav-link active">Чат</a>
                <a href="#" class="nav-link">Документы</a>
                <a href="#" class="nav-link">Настройки</a>
            </div>
        </nav>

        <div class="content-wrapper">
            <aside class="sidebar">
                <div class="sidebar-section">
                    <h3>Документы</h3>
                    <div class="file-input-wrapper">
                        <input type="file" id="fileInput2" accept=".pdf,.docx,.txt,.md">
                        <label for="fileInput2" class="file-btn">
                            <span class="btn-icon">+</span>
                            Добавить документ
                        </label>
                    </div>
                    <div class="documents-list" id="documentsList2"></div>
                </div>
            </aside>

            <main class="main-area">
                <div class="chat-container">
                    <div class="chat-header">
                        <h2>Вопросы к документам</h2>
                        <div class="status-badge ready">Готов к работе</div>
                    </div>
                    
                    <div class="chat-messages" id="chatMessages2">
                        <div class="message assistant">
                            <div class="message-avatar">🤖</div>
                            <div class="message-body">
                                <div class="message-text">Здравствуйте! Я готов отвечать на вопросы по вашим документам. Загрузите документ, чтобы начать.</div>
                            </div>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <textarea id="queryInput2" placeholder="Введите ваш вопрос..."></textarea>
                        <button id="sendButton2" class="send-btn">
                            <span class="btn-icon">➤</span>
                            Отправить
                        </button>
                    </div>
                </div>
            </main>
        </div>
    </div>
</body>
</html>
